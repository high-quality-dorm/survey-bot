[project]
name = "survio"
version = "0.1.0"

authors = [
    { name = "sanbob", email = "saintsanbob@gmail.com" },
    { name = "zpenr", email = "zpenr@bk.ru" },
]
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.31.0",
    "pydantic-settings",
    "sqlalchemy>=2.0.51",
]

[build-system]
requires = ["uv_build>=0.11.23,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-mock>=3.15.1",
]
